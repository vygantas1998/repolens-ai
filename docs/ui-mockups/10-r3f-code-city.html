<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RepoLens AI - React Three Fiber Code City</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050712;
        --panel: rgba(15, 23, 42, 0.88);
        --line: rgba(148, 163, 184, 0.24);
        --text: #f8fafc;
        --muted: #94a3b8;
        --teal: #0f766e;
        --teal-light: #5eead4;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: var(--text);
        background: linear-gradient(135deg, #050712, #0b1020 48%, #050712);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root { min-height: 100vh; }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        height: 100vh;
      }

      .stage {
        position: relative;
        min-width: 0;
        background: radial-gradient(circle at 50% 42%, rgba(15, 118, 110, 0.16), transparent 34rem), #020617;
      }

      .hero {
        position: absolute;
        left: 20px;
        top: 20px;
        z-index: 10;
        max-width: 650px;
        border: 1px solid var(--line);
        border-radius: 26px;
        background: rgba(2, 6, 23, 0.78);
        padding: 16px 18px;
        backdrop-filter: blur(16px);
        pointer-events: none;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--teal-light);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4vw, 58px);
        line-height: 0.94;
        letter-spacing: -0.075em;
      }

      .hero p:not(.eyebrow) {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .hint {
        position: absolute;
        left: 20px;
        bottom: 20px;
        z-index: 10;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.78);
        color: var(--muted);
        padding: 11px 14px;
        font-size: 13px;
        backdrop-filter: blur(16px);
      }

      .inspector {
        height: 100vh;
        overflow-y: auto;
        border-left: 1px solid var(--line);
        background: var(--panel);
      }

      .inspect-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .inspect-head h2 {
        margin: 8px 0 0;
        font-size: 30px;
        letter-spacing: -0.055em;
      }

      .inspect-head p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .inspect-body {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .metric,
      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(2, 6, 23, 0.62);
        padding: 14px;
      }

      .metric strong {
        display: block;
        font-size: 30px;
        letter-spacing: -0.06em;
      }

      .metric span,
      .card p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .card b { display: block; margin-bottom: 7px; }

      .label {
        transform: translate(-50%, -50%);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.82);
        color: #e2e8f0;
        padding: 5px 8px;
        font: 12px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
        white-space: nowrap;
        pointer-events: none;
      }

      .district-label {
        transform: translate(-50%, -50%);
        color: #e2e8f0;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
        pointer-events: none;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      }

      @media (max-width: 1000px) {
        body { overflow: auto; }
        .app { grid-template-columns: 1fr; height: auto; }
        .stage { height: 760px; }
        .inspector { height: auto; border-left: 0; border-top: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useState } from "https://esm.sh/react@19.0.0";
      import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";
      import * as THREE from "https://esm.sh/three@0.176.0";
      import { Canvas } from "https://esm.sh/@react-three/fiber@9.1.2?deps=react@19.0.0,react-dom@19.0.0,three@0.176.0";
      import { Html, OrbitControls, PerspectiveCamera, Text } from "https://esm.sh/@react-three/drei@10.0.7?deps=react@19.0.0,react-dom@19.0.0,three@0.176.0,@react-three/fiber@9.1.2";

      const h = React.createElement;

      const districts = [
        { id: "client", label: "Client District", position: [-5.5, 0.03, -3.3], size: [4.2, 3.0], color: "#2563eb", description: "Area is large because the UI owns most visible product behavior." },
        { id: "server", label: "Server District", position: [5.3, 0.03, -3.1], size: [4.4, 3.2], color: "#059669", description: "API endpoints and validation live here." },
        { id: "shared", label: "Core Plaza", position: [0, 0.04, 0.25], size: [3.4, 2.5], color: "#0f766e", description: "Small footprint, high importance because shared types connect the system." },
        { id: "logic", label: "Analyzer Quarter", position: [5.2, 0.03, 3.35], size: [4.3, 2.8], color: "#7c3aed", description: "Heuristic engine and graph-building behavior." },
        { id: "docs", label: "Docs Park", position: [-5.5, 0.03, 3.45], size: [3.9, 2.7], color: "#b45309", description: "Planning, README, and design exploration." }
      ];

      const buildings = [
        { name: "client/src/App.tsx", district: "client", position: [-6.4, -3.5], size: [0.8, 2.7, 0.8], color: "#2563eb", landmark: true, purpose: "Main frontend shell. Coordinates analysis, selected node state, and inspector interactions." },
        { name: "ArchitectureMap.tsx", district: "client", position: [-5.35, -3.8], size: [0.72, 1.75, 0.72], color: "#3b82f6", purpose: "Renders the architecture canvas nodes." },
        { name: "ResultsPanel.tsx", district: "client", position: [-4.55, -3.15], size: [0.68, 1.55, 0.68], color: "#60a5fa", purpose: "Shows selected module details and supporting file lists." },
        { name: "server/src/app.ts", district: "server", position: [4.35, -3.35], size: [0.88, 2.85, 0.88], color: "#059669", landmark: true, purpose: "Express app factory. Owns API routes and validation." },
        { name: "/api/ask-tree", district: "server", position: [5.45, -3.7], size: [0.72, 1.7, 0.72], color: "#dc2626", risk: true, purpose: "Risk marker: useful later with real AI, but currently less exciting than the visual canvas workflow." },
        { name: "server/src/index.ts", district: "server", position: [6.3, -3.05], size: [0.62, 1.05, 0.62], color: "#34d399", purpose: "Server startup and port binding." },
        { name: "shared/analysis.ts", district: "shared", position: [-0.4, 0.1], size: [1.05, 3.35, 1.05], color: "#0f766e", landmark: true, purpose: "Shared TypeScript contract. Tallest building because frontend and backend both depend on it." },
        { name: "Tree DTOs", district: "shared", position: [0.95, 0.35], size: [0.62, 1.25, 0.62], color: "#14b8a6", purpose: "Request and response types for analysis and focused answers." },
        { name: "treeAnalyzer.ts", district: "logic", position: [4.35, 3.25], size: [0.88, 2.55, 0.88], color: "#7c3aed", landmark: true, purpose: "Heuristic engine for technologies, folders, risks, graph nodes, and entry points." },
        { name: "treeAnalyzer.test.ts", district: "logic", position: [5.55, 3.65], size: [0.74, 1.55, 0.74], color: "#a78bfa", purpose: "Behavioral tests for analyzer rules." },
        { name: "README.md", district: "docs", position: [-6.3, 3.3], size: [0.66, 1.15, 0.66], color: "#b45309", purpose: "Project explanation, setup commands, and roadmap." },
        { name: "mvp-scope.md", district: "docs", position: [-5.35, 3.75], size: [0.62, 0.95, 0.62], color: "#d97706", purpose: "Defines MVP promise and constraints." },
        { name: "ui mockups", district: "docs", position: [-4.45, 3.35], size: [0.72, 1.05, 0.72], color: "#f59e0b", purpose: "Design exploration and future city concepts." }
      ];

      function Ground() {
        return h("group", null,
          h("mesh", { rotation: [-Math.PI / 2, 0, 0], position: [0, -0.03, 0], receiveShadow: true },
            h("planeGeometry", { args: [16, 11] }),
            h("meshStandardMaterial", { color: "#07111f", roughness: 0.92 })
          ),
          h("gridHelper", { args: [16, 32, "#334155", "#1e293b"], position: [0, 0, 0] })
        );
      }

      function Road({ position, size }) {
        return h("mesh", { position: [position[0], 0.02, position[1]], receiveShadow: true },
          h("boxGeometry", { args: [size[0], 0.035, size[1]] }),
          h("meshStandardMaterial", { color: "#162033", roughness: 0.86 })
        );
      }

      function District({ district }) {
        return h("group", null,
          h("mesh", { position: district.position, receiveShadow: true },
            h("boxGeometry", { args: [district.size[0], 0.055, district.size[1]] }),
            h("meshStandardMaterial", { color: district.color, transparent: true, opacity: 0.2, roughness: 0.82 })
          ),
          h("lineSegments", { position: [district.position[0], 0.08, district.position[2]] },
            h("edgesGeometry", { args: [new THREE.BoxGeometry(district.size[0], 0.06, district.size[1])] }),
            h("lineBasicMaterial", { color: district.color, transparent: true, opacity: 0.55 })
          ),
          h(Html, { position: [district.position[0], 0.16, district.position[2] - district.size[1] / 2 - 0.25], center: true },
            h("div", { className: "district-label" }, district.label)
          )
        );
      }

      function Building({ building, selected, onSelect }) {
        const height = building.size[1];
        const y = height / 2;
        return h("group", { position: [building.position[0], y, building.position[1]], onClick: (event) => { event.stopPropagation(); onSelect(building); } },
          h("mesh", { castShadow: true, receiveShadow: true },
            h("boxGeometry", { args: building.size }),
            h("meshStandardMaterial", { color: building.color, roughness: 0.54, metalness: 0.08 })
          ),
          h("lineSegments", null,
            h("edgesGeometry", { args: [new THREE.BoxGeometry(...building.size)] }),
            h("lineBasicMaterial", { color: building.risk ? "#fecdd3" : building.landmark || selected ? "#ccfbf1" : "#cbd5e1", transparent: true, opacity: building.risk || building.landmark || selected ? 0.92 : 0.28 })
          ),
          building.landmark || building.risk || selected ? h(Html, { position: [0, height / 2 + 0.35, 0], center: true },
            h("div", { className: "label" }, building.risk ? "risk" : building.name.split("/").at(-1))
          ) : null
        );
      }

      function City({ selected, setSelected }) {
        return h(React.Fragment, null,
          h(PerspectiveCamera, { makeDefault: true, position: [8, 8, 9], fov: 48 }),
          h(OrbitControls, { enableDamping: true, dampingFactor: 0.08, minDistance: 6, maxDistance: 18, maxPolarAngle: Math.PI / 2.08, target: [0, 0, 0] }),
          h("ambientLight", { intensity: 0.72 }),
          h("directionalLight", { position: [5, 9, 4], intensity: 2.2, castShadow: true, "shadow-mapSize-width": 2048, "shadow-mapSize-height": 2048 }),
          h("directionalLight", { position: [-6, 4, -5], intensity: 0.7, color: "#5eead4" }),
          h(Ground),
          h(Road, { position: [0, -1.55], size: [15.5, 0.28] }),
          h(Road, { position: [0, 1.85], size: [15.5, 0.28] }),
          h(Road, { position: [-2.5, 0], size: [0.3, 10.5] }),
          h(Road, { position: [2.7, 0], size: [0.3, 10.5] }),
          districts.map((district) => h(District, { district, key: district.id })),
          buildings.map((building) => h(Building, { building, key: building.name, selected: selected.name === building.name, onSelect: setSelected }))
        );
      }

      function Inspector({ selected }) {
        return h("aside", { className: "inspector" },
          h("div", { className: "inspect-head" },
            h("p", { className: "eyebrow" }, "Selected building"),
            h("h2", null, selected.name),
            h("p", null, selected.purpose)
          ),
          h("div", { className: "inspect-body" },
            h("div", { className: "metrics" },
              h("div", { className: "metric" }, h("strong", null, districts.length), h("span", null, "districts")),
              h("div", { className: "metric" }, h("strong", null, buildings.length), h("span", null, "buildings")),
              h("div", { className: "metric" }, h("strong", null, buildings.filter((building) => building.landmark).length), h("span", null, "landmarks")),
              h("div", { className: "metric" }, h("strong", null, buildings.filter((building) => building.risk).length), h("span", null, "risk markers"))
            ),
            h("div", { className: "card" },
              h("b", null, "How to use"),
              h("p", null, "Drag to orbit, scroll to zoom, right-drag to pan. Click buildings to inspect files. District area represents folder size or importance; height represents file importance.")
            ),
            h("div", { className: "card" },
              h("b", null, "Why this is better for 3D"),
              h("p", null, "This uses real Three.js meshes, lighting, shadows, camera controls, and depth. It should feel closer to 3D objects than CSS squares.")
            )
          )
        );
      }

      function App() {
        const [selected, setSelected] = useState(buildings.find((building) => building.name === "shared/analysis.ts") ?? buildings[0]);
        return h("main", { className: "app" },
          h("section", { className: "stage" },
            h("div", { className: "hero" },
              h("p", { className: "eyebrow" }, "React Three Fiber prototype"),
              h("h1", null, "Real 3D code city."),
              h("p", null, "This mock uses Three.js, @react-three/fiber, and drei. It is a prototype for the future experimental city view, not the current MVP.")
            ),
            h(Canvas, { shadows: true, gl: { antialias: true }, camera: { position: [8, 8, 9], fov: 48 } },
              h(City, { selected, setSelected })
            ),
            h("div", { className: "hint" }, "Left drag: orbit. Scroll: zoom. Right drag: pan. Click buildings.")
          ),
          h(Inspector, { selected })
        );
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
